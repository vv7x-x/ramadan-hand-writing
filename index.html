<script>
var vid = document.getElementById('vid');
var c = document.getElementById('c');
var ctx = c.getContext('2d');

var arr = [];
var cur = [];
var draw = false;
var sx = null;
var sy = null;

function distance(a, b) {
  var dx = a.x - b.x;
  var dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy);
}

function run(res) {

  c.width = window.innerWidth;
  c.height = window.innerHeight;

  ctx.drawImage(res.image, 0, 0, c.width, c.height);

  ctx.shadowColor = '#F5D061';
  ctx.shadowBlur = 15;
  ctx.strokeStyle = '#F5D061';
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // رسم الخطوط القديمة
  for (var i = 0; i < arr.length; i++) {
    ctx.beginPath();
    for (var j = 0; j < arr[i].length; j++) {
      if (j == 0) ctx.moveTo(arr[i][j].x, arr[i][j].y);
      else ctx.lineTo(arr[i][j].x, arr[i][j].y);
    }
    ctx.stroke();
  }

  if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {

    var lm = res.multiHandLandmarks[0];

    drawConnectors(ctx, lm, HAND_CONNECTIONS,
      {color: 'rgba(245, 208, 97, 0.3)', lineWidth: 2});
    drawLandmarks(ctx, lm,
      {color: '#FFFFFF', lineWidth: 1, radius: 2});

    var index = lm[8];
    var thumb = lm[4];
    var middle = lm[12];
    var ring = lm[16];
    var pinky = lm[20];

    var rx = index.x * c.width;
    var ry = index.y * c.height;

    // تنعيم
    if (sx == null) {
      sx = rx;
      sy = ry;
    } else {
      sx += (rx - sx) * 0.45;
      sy += (ry - sy) * 0.45;
    }

    // مؤشر
    ctx.beginPath();
    ctx.arc(sx, sy, 6, 0, 2 * Math.PI);
    ctx.fillStyle = '#FFFFFF';
    ctx.fill();

    var pinch = distance(index, thumb);

    var openPalm =
      distance(index, middle) > 0.07 &&
      distance(index, ring) > 0.1 &&
      distance(index, pinky) > 0.12;

    // ✍️ رسم
    if (pinch < 0.05) {

      if (!draw) {
        draw = true;
        cur = [];
        arr.push(cur);
      }

      cur.push({x: sx, y: sy});
    }

    // 🧽 مسح
    else if (openPalm) {
      arr = [];
      draw = false;
    }

    else {
      draw = false;
    }

  } else {
    draw = false;
    sx = null;
  }
}

var h = new Hands({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }
});

h.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

h.onResults(run);

var cam = new Camera(vid, {
  onFrame: async () => { await h.send({image: vid}); },
  width: 1280,
  height: 720
});

cam.start();
</script>
