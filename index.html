<!DOCTYPE html>
<html>
<head>
    <title>3D Gesture Particles</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; }
        video { display: none; } /* Hide the raw feed */
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <video id="video" autoplay playsinline></video>

<script>
// --- 1. SETUP THREE.JS ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('canvas-container').appendChild(renderer.domElement);

// --- 2. PARTICLE SYSTEM CONFIG ---
const PARTICLE_COUNT = 5000;
const positions = new Float32Array(PARTICLE_COUNT * 3);
const colors = new Float32Array(PARTICLE_COUNT * 3);
const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const material = new THREE.PointsMaterial({
    size: 0.05,
    vertexColors: true,
    transparent: true,
    blending: THREE.AdditiveBlending
});

const particleSystem = new THREE.Points(geometry, material);
scene.add(particleSystem);
camera.position.z = 5;

// --- 3. SHAPE GENERATORS ---
const shapes = {
    sphere: () => {
        const pts = [];
        for(let i=0; i<PARTICLE_COUNT; i++) {
            const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
            const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
            pts.push(new THREE.Vector3(2 * Math.cos(theta) * Math.sin(phi), 2 * Math.sin(theta) * Math.sin(phi), 2 * Math.cos(phi)));
        }
        return pts;
    },
    heart: () => {
        const pts = [];
        for(let i=0; i<PARTICLE_COUNT; i++) {
            const t = Math.random() * Math.PI * 2;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            pts.push(new THREE.Vector3(x * 0.1, y * 0.1, (Math.random() - 0.5) * 0.5));
        }
        return pts;
    }
};

let targetPoints = shapes.sphere();

// --- 4. GESTURE TRACKING (MediaPipe) ---
const video = document.getElementById('video');
const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });
hands.onResults(onResults);

async function setupCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    return new Promise(resolve => video.onloadedmetadata = () => resolve());
}

function onResults(results) {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const hand = results.multiHandLandmarks[0];
        
        // Dynamic Behavior: Expansion based on distance between thumb and index
        const dx = hand[4].x - hand[8].x;
        const dy = hand[4].y - hand[8].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        // Interaction: Map hand position to particle center
        particleSystem.position.x = (hand[9].x - 0.5) * -10;
        particleSystem.position.y = (hand[9].y - 0.5) * -10;
        
        // Switch Shape: If palm is facing camera, change shape
        if (dist > 0.2) targetPoints = shapes.heart();
        else targetPoints = shapes.sphere();
    }
}

// --- 5. ANIMATION LOOP ---
function animate() {
    requestAnimationFrame(animate);
    
    const posAttr = geometry.attributes.position;
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const target = targetPoints[i % targetPoints.length];
        // Smooth lerping towards target
        posAttr.array[i*3] += (target.x - posAttr.array[i*3]) * 0.1;
        posAttr.array[i*3+1] += (target.y - posAttr.array[i*3+1]) * 0.1;
        posAttr.array[i*3+2] += (target.z - posAttr.array[i*3+2]) * 0.1;
    }
    posAttr.needsUpdate = true;
    renderer.render(scene, camera);
}

setupCamera().then(() => {
    const timer = setInterval(async () => {
        await hands.send({image: video});
    }, 30);
    animate();
});
</script>
</body>
</html>
