<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Hand Pen Pro | الرسم الذكي</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Noto+Sans+Arabic:wght@400;700&display=swap');

        :root {
            --accent: #F5D061;
            --bg: #0a0a0c;
        }

        body {
            margin: 0;
            background: var(--bg);
            overflow: hidden;
            font-family: 'Noto Sans Arabic', sans-serif;
            color: white;
            touch-action: none;
        }

        video {
            display: none;
        }

        canvas {
            width: 100vw;
            height: 100vh;
            display: block;
            background: #000;
        }

        /* الطبقة العلوية للواجهة */
        .hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #status {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            font-size: 0.9rem;
        }

        .palette {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: all;
        }

        .dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dot.active {
            border-color: white;
            transform: scale(1.2);
            box-shadow: 0 0 20px currentColor;
        }

        .bottom-bar {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            pointer-events: all;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 24px;
            border-radius: 14px;
            backdrop-filter: blur(15px);
            font-weight: bold;
            cursor: pointer;
        }

        .btn:active {
            transform: scale(0.9);
        }

        .btn-red {
            color: #ff4d4d;
            border-color: #ff4d4d;
        }

        /* تلميحات الحركة */
        .hints {
            position: absolute;
            bottom: 100px;
            left: 20px;
            font-size: 0.8rem;
            opacity: 0.6;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
    <div class="hud">
        <div id="status">جاري تشغيل النظام... 🚀</div>

        <div class="palette" id="palette">
            <div class="dot active" style="color: #F5D061; background: #F5D061;" data-color="#F5D061"></div>
            <div class="dot" style="color: #ff3e3e; background: #ff3e3e;" data-color="#ff3e3e"></div>
            <div class="dot" style="color: #00ff88; background: #00ff88;" data-color="#00ff88"></div>
            <div class="dot" style="color: #3e88ff; background: #3e88ff;" data-color="#3e88ff"></div>
            <div class="dot" style="color: #fff; background: #000; border: 1px solid white;" data-color="eraser">🧼
            </div>
        </div>

        <div class="hints">
            🤏 قرص بالإبهام والسبابة للرسم<br>
            📏 باعد بين الإبهام والوسطى للحجم<br>
            🖐️ عدد أصابعك يغير اللون (1-4)<br>
            🧼 كف مفتوح (5 أصابع) للممحاة
        </div>

        <div class="bottom-bar">
            <button class="btn" onclick="undo()">تراجع ↩️</button>
            <button class="btn btn-red" onclick="clearAll()">مسح 🗑️</button>
            <button class="btn" onclick="download()">حفظ 💾</button>
        </div>
    </div>

    <video id="vid" playsinline></video>

    <script>
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        const statusEl = document.getElementById('status');
        const vid = document.getElementById('vid');

        let strokes = [];
        let currentStroke = null;
        let color = '#F5D061';
        let width = 8;
        let sparkles = [];

        // تنعيم متقدم
        let sx = null, sy = null;
        const lerp = (a, b, f) => a + (b - a) * f;

        // ثبات التعرف على الحركات
        let frameBuffer = [];
        const BUFFER_SIZE = 5;

        function clearAll() { strokes = []; }
        function undo() { strokes.pop(); }
        function download() {
            const link = document.createElement('a');
            link.download = 'art.png';
            link.href = c.toDataURL();
            link.click();
        }

        // اختيار اللون يدوياً أيضاً
        document.querySelectorAll('.dot').forEach(d => {
            d.onclick = () => {
                document.querySelector('.dot.active').classList.remove('active');
                d.classList.add('active');
                color = d.dataset.color;
            };
        });

        function run(res) {
            c.width = window.innerWidth;
            c.height = window.innerHeight;

            // رسم الخلفية (المرآة)
            ctx.save();
            ctx.scale(-1, 1);
            ctx.translate(-c.width, 0);
            ctx.globalAlpha = 0.4; // جعل الكاميرا خافتة للتركيز على الرسم
            ctx.drawImage(res.image, 0, 0, c.width, c.height);
            ctx.restore();

            // رسم الخطوط القديمة بتأثير ناعم
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            strokes.forEach(s => {
                if (s.pts.length < 2) return;
                ctx.beginPath();
                ctx.strokeStyle = s.color === 'eraser' ? '#000' : s.color;
                ctx.lineWidth = s.w;
                ctx.moveTo(s.pts[0].x, s.pts[0].y);
                for (let i = 1; i < s.pts.length; i++) {
                    ctx.lineTo(s.pts[i].x, s.pts[i].y);
                }
                ctx.stroke();
            });

            if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                const hl = res.multiHandLandmarks[0];

                // تحديد موقع المؤشر (السبابة)
                const tx = (1 - hl[8].x) * c.width;
                const ty = hl[8].y * c.height;

                // تنعيم فائق (Exponential Smoothing)
                if (sx === null) { sx = tx; sy = ty; }
                else { sx = lerp(sx, tx, 0.2); sy = lerp(sy, ty, 0.2); }

                // حساب المسافات للحركات
                const distPinch = Math.hypot(hl[8].x - hl[4].x, hl[8].y - hl[4].y);
                const distSize = Math.hypot(hl[12].x - hl[4].x, hl[12].y - hl[4].y);

                const isDrawing = distPinch < 0.04;

                // نظام الحجم التلقائي (تغيير الحجم عند عدم الرسم)
                if (!isDrawing && distSize < 0.2) {
                    let nw = distSize * 400;
                    width = lerp(width, Math.max(2, Math.min(100, nw)), 0.1);
                }

                // التعرف على عدد الأصابع لتغيير اللون (مع تثبيت)
                let fingers = 0;
                [8, 12, 16, 20].forEach(tip => { if (hl[tip].y < hl[tip - 2].y) fingers++; });
                if (Math.abs(hl[4].x - hl[2].x) > 0.08) fingers++;

                frameBuffer.push(fingers);
                if (frameBuffer.length > BUFFER_SIZE) frameBuffer.shift();

                const stableFingers = Math.round(frameBuffer.reduce((a, b) => a + b) / frameBuffer.length);

                if (!isDrawing && stableFingers > 0) {
                    const dots = document.querySelectorAll('.dot');
                    let targetIdx = stableFingers - 1;
                    if (targetIdx >= 0 && targetIdx < dots.length) {
                        dots[targetIdx].click();
                        statusEl.innerText = stableFingers === 5 ? "الممحاة مفعلة 🧼" : "اللون: " + stableFingers;
                    }
                }

                // رسم المؤشر التفاعلي
                ctx.beginPath();
                ctx.arc(sx, sy, width / 2 + 5, 0, Math.PI * 2);
                ctx.strokeStyle = "white";
                ctx.lineWidth = 2;
                ctx.stroke();

                if (isDrawing) {
                    ctx.fillStyle = color === 'eraser' ? 'white' : color;
                    ctx.fill();

                    if (!currentStroke) {
                        currentStroke = { pts: [], color: color, w: width };
                        strokes.push(currentStroke);
                    }
                    currentStroke.pts.push({ x: sx, y: sy });
                    statusEl.innerText = "✨ يرسم الآن...";
                } else {
                    currentStroke = null;
                    if (stableFingers === 0) statusEl.innerText = "تحكم بيدك 👋";
                }

                // رسم هيكل اليد بشكل خفي جداً للمساعدة
                drawConnectors(ctx, hl, HAND_CONNECTIONS, { color: 'rgba(255,255,255,0.05)', lineWidth: 1 });
            } else {
                statusEl.innerText = "🔍 ابحث عن يدك...";
                sx = null; sy = null;
            }
        }

        const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        hands.onResults(run);

        const cam = new Camera(vid, {
            onFrame: async () => { await hands.send({ image: vid }); },
            width: 1280, height: 720
        });
        cam.start();
    </script>
</body>

</html>
