<!DOCTYPE html>
<html>
<head>
<title>Air Hand Paint - Camera Mode</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
}
video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scaleX(-1);
}
canvas{
  position:absolute;
  width:100%;
  height:100%;
  pointer-events:none;
  transform:scaleX(-1);
}
</style>
</head>
<body>

<video id="vid" autoplay playsinline></video>
<canvas id="c"></canvas>

<script>

var vid=document.getElementById("vid");
var c=document.getElementById("c");
var ctx=c.getContext("2d");

function resize(){
  c.width=window.innerWidth;
  c.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

var strokes=[];
var currentStroke=null;
var drawing=false;
var smoothX=null;
var smoothY=null;
var currentColor="#ff0000";

// 🎨 لوحة ألوان أعلى الشاشة
var palette=[
  {color:"#ff0000"},
  {color:"#00ff00"},
  {color:"#0099ff"},
  {color:"#ffff00"},
  {color:"#ffffff"}
];

function drawPalette(){
  var spacing=70;
  var start=c.width/2-((palette.length-1)*spacing)/2;

  palette.forEach((p,i)=>{
    p.x=start+i*spacing;
    p.y=80;

    ctx.beginPath();
    ctx.arc(p.x,p.y,25,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();

    if(currentColor==p.color){
      ctx.lineWidth=4;
      ctx.strokeStyle="#000";
      ctx.stroke();
    }
  });
}

function distance(a,b){
  var dx=a.x-b.x;
  var dy=a.y-b.y;
  return Math.sqrt(dx*dx+dy*dy);
}

function run(res){

  ctx.clearRect(0,0,c.width,c.height);

  // رسم الخطوط
  ctx.lineWidth=6;
  ctx.lineCap="round";
  ctx.lineJoin="round";
  ctx.shadowBlur=10;
  ctx.globalCompositeOperation="source-over";

  strokes.forEach(s=>{
    ctx.strokeStyle=s.color;
    ctx.beginPath();
    s.points.forEach((p,i)=>{
      if(i==0) ctx.moveTo(p.x,p.y);
      else ctx.lineTo(p.x,p.y);
    });
    ctx.stroke();
  });

  drawPalette();

  if(res.multiHandLandmarks && res.multiHandLandmarks.length>0){

    var lm=res.multiHandLandmarks[0];

    var index=lm[8];
    var thumb=lm[4];
    var middle=lm[12];
    var ring=lm[16];
    var pinky=lm[20];

    var rx=index.x*c.width;
    var ry=index.y*c.height;

    if(smoothX==null){
      smoothX=rx;
      smoothY=ry;
    }else{
      smoothX+=(rx-smoothX)*0.4;
      smoothY+=(ry-smoothY)*0.4;
    }

    // مؤشر
    ctx.beginPath();
    ctx.arc(smoothX,smoothY,8,0,Math.PI*2);
    ctx.fillStyle=currentColor;
    ctx.fill();

    var pinch=distance(index,thumb);

    var openPalm=
      distance(index,middle)>0.07 &&
      distance(index,ring)>0.1 &&
      distance(index,pinky)>0.12;

    // 🎨 اختيار لون
    palette.forEach(p=>{
      var dx=smoothX-p.x;
      var dy=smoothY-p.y;
      var d=Math.sqrt(dx*dx+dy*dy);
      if(d<25 && pinch<0.05){
        currentColor=p.color;
        drawing=false;
      }
    });

    // ✍️ رسم
    if(pinch<0.05 && smoothY>120){

      if(!drawing){
        drawing=true;
        currentStroke={color:currentColor,points:[]};
        strokes.push(currentStroke);
      }

      currentStroke.points.push({x:smoothX,y:smoothY});
    }

    // 🧽 مسح
    else if(openPalm){
      strokes=[];
      drawing=false;
    }

    else{
      drawing=false;
    }

  }else{
    drawing=false;
    smoothX=null;
  }
}

// MediaPipe
var hands=new Hands({
  locateFile:file=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands:1,
  modelComplexity:1,
  minDetectionConfidence:0.7,
  minTrackingConfidence:0.7
});

hands.onResults(run);

var camera=new Camera(vid,{
  onFrame:async()=>{await hands.send({image:vid});},
  width:1280,
  height:720
});

camera.start();

</script>
</body>
</html>
